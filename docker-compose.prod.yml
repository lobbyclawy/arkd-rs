version: '3.8'

services:
  arkd:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "7070:7070"
      - "7071:7071"
    volumes:
      - arkd-data:/home/arkd/.arkd
      - ./config.toml:/home/arkd/.arkd/config.toml:ro
    environment:
      - RUST_LOG=info
      - ARKD_WALLET_PASSPHRASE=${ARKD_WALLET_PASSPHRASE:-}
    restart: unless-stopped
    depends_on:
      - bitcoin

  bitcoin:
    image: ruimarinho/bitcoin-core:latest
    command: >
      -regtest
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -rpcuser=admin1
      -rpcpassword=123
      -server
    ports:
      - "18443:18443"

volumes:
  arkd-data:
