syntax = "proto3";

package ark.v1;

import "ark/v1/types.proto";

// ArkService is the user-facing API for the Ark protocol server.
service ArkService {
  // GetInfo returns server information and parameters.
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);

  // DEPRECATED: use RegisterIntent instead.
  // RegisterForRound registers a user's intent for the next available round.
  // DEPRECATED: Use RegisterIntent instead.
  rpc RegisterForRound(RegisterForRoundRequest) returns (RegisterForRoundResponse);

  // DEPRECATED: use RegisterIntent instead.
  // RequestExit requests a collaborative exit from the protocol.
  // DEPRECATED: Collaborative exits now use SubmitTx/FinalizeTx flow.
  rpc RequestExit(RequestExitRequest) returns (RequestExitResponse);

  // GetVtxos returns VTXOs for a given public key.
  // DEPRECATED: Use IndexerService.GetVtxos instead.
  rpc GetVtxos(GetVtxosRequest) returns (GetVtxosResponse);

  // ListRounds returns a paginated list of rounds.
  // DEPRECATED: Use AdminService.GetRounds instead.
  rpc ListRounds(ListRoundsRequest) returns (ListRoundsResponse);

  // GetRound returns details for a specific round.
  // DEPRECATED: Use AdminService.GetRoundDetails instead.
  rpc GetRound(GetRoundRequest) returns (GetRoundResponse);

  // RegisterIntent allows to register a new intent that will be eventually
  // selected by the server for a particular batch. The client should provide a
  // BIP-322 message with the intent information.
  rpc RegisterIntent(RegisterIntentRequest) returns (RegisterIntentResponse);

  // EstimateIntentFee estimates the fees for a given intent.
  rpc EstimateIntentFee(EstimateIntentFeeRequest) returns (EstimateIntentFeeResponse);

  // DeleteIntent removes a previously registered intent.
  rpc DeleteIntent(DeleteIntentRequest) returns (DeleteIntentResponse);

  // ConfirmRegistration confirms participation in a batch after being selected.
  rpc ConfirmRegistration(ConfirmRegistrationRequest) returns (ConfirmRegistrationResponse);

  // SubmitTreeNonces submits MuSig2 nonces for VTXO tree signing.
  rpc SubmitTreeNonces(SubmitTreeNoncesRequest) returns (SubmitTreeNoncesResponse);

  // SubmitTreeSignatures submits partial MuSig2 signatures for VTXO tree signing.
  rpc SubmitTreeSignatures(SubmitTreeSignaturesRequest) returns (SubmitTreeSignaturesResponse);

  // SubmitSignedForfeitTxs submits signed forfeit transactions.
  rpc SubmitSignedForfeitTxs(SubmitSignedForfeitTxsRequest) returns (SubmitSignedForfeitTxsResponse);

  // GetEventStream opens a server-streaming connection for batch lifecycle events.
  rpc GetEventStream(GetEventStreamRequest) returns (stream GetEventStreamResponse);

  // UpdateStreamTopics updates the set of event topics the client subscribes to.
  rpc UpdateStreamTopics(UpdateStreamTopicsRequest) returns (UpdateStreamTopicsResponse);

  // SubmitTx submits an offchain transaction spending VTXOs.
  rpc SubmitTx(SubmitTxRequest) returns (SubmitTxResponse);

  // FinalizeTx finalizes a previously submitted offchain transaction.
  rpc FinalizeTx(FinalizeTxRequest) returns (FinalizeTxResponse);

  // GetPendingTx returns not finalized transaction(s) for a given set of inputs.
  rpc GetPendingTx(GetPendingTxRequest) returns (GetPendingTxResponse);

  // GetTransactionsStream is a server-side streaming RPC for real-time
  // notifications about commitment tx or ark tx processed by the server.
  rpc GetTransactionsStream(GetTransactionsStreamRequest) returns (stream GetTransactionsStreamResponse);

  // GetIntent returns intent details by id or filter.
  rpc GetIntent(GetIntentRequest) returns (GetIntentResponse);
}

// ─── GetInfo ────────────────────────────────────────────────────────────────

message GetInfoRequest {}
message GetInfoResponse {
  string version = 1;
  string signer_pubkey = 2;
  string forfeit_pubkey = 3;
  string forfeit_address = 4;
  string checkpoint_tapscript = 5;
  string network = 6;
  int64 session_duration = 7;
  int64 unilateral_exit_delay = 8;
  int64 boarding_exit_delay = 9;
  int64 utxo_min_amount = 10;
  int64 utxo_max_amount = 11; // -1 means no limit (default), 0 means boarding not allowed
  int64 vtxo_min_amount = 12;
  int64 vtxo_max_amount = 13; // -1 means no limit (default)
  int64 dust = 14;
  FeeInfo fees = 15;
  ScheduledSession scheduled_session = 16;
  repeated DeprecatedSigner deprecated_signers = 17;
  map<string, string> service_status = 18;
  string digest = 19;
  int64 max_tx_weight = 20;
}

// ─── RegisterForRound (DEPRECATED) ─────────────────────────────────────────

message RegisterForRoundRequest {
  string pubkey = 1;
  uint64 amount = 2;
  repeated Input inputs = 3;
}
message RegisterForRoundResponse {
  string intent_id = 1;
  string round_id = 2;
}

// ─── RequestExit (DEPRECATED) ───────────────────────────────────────────────

message RequestExitRequest {
  repeated Outpoint vtxo_ids = 1;
  string destination = 2;
}
message RequestExitResponse {
  string exit_id = 1;
  string status = 2;
}

// ─── GetVtxos ───────────────────────────────────────────────────────────────

message GetVtxosRequest {
  string pubkey = 1;
}
message GetVtxosResponse {
  repeated Vtxo spendable = 1;
  repeated Vtxo spent = 2;
}

// ─── ListRounds / GetRound ──────────────────────────────────────────────────

message ListRoundsRequest {
  int64 after = 1;
  int64 before = 2;
  uint32 limit = 3;
  uint32 offset = 4;
}
message ListRoundsResponse {
  repeated Round rounds = 1;
}

message GetRoundRequest {
  string round_id = 1;
}
message GetRoundResponse {
  RoundDetails round = 1;
}

// ─── RegisterIntent ─────────────────────────────────────────────────────────

message RegisterIntentRequest {
  Intent intent = 1;
}
message RegisterIntentResponse {
  string intent_id = 1;
}

// ─── EstimateIntentFee ──────────────────────────────────────────────────────

message EstimateIntentFeeRequest {
  Intent intent = 1;
}
message EstimateIntentFeeResponse {
  int64 fee = 1;
}

// ─── DeleteIntent ───────────────────────────────────────────────────────────

message DeleteIntentRequest {
  Intent intent = 1;
}
message DeleteIntentResponse {}

// ─── ConfirmRegistration ────────────────────────────────────────────────────

message ConfirmRegistrationRequest {
  string intent_id = 1;
}
message ConfirmRegistrationResponse {}

// ─── SubmitTreeNonces ───────────────────────────────────────────────────────

message SubmitTreeNoncesRequest {
  string batch_id = 1;
  string pubkey = 2;
  map<string, string> tree_nonces = 3;
}
message SubmitTreeNoncesResponse {}

// ─── SubmitTreeSignatures ───────────────────────────────────────────────────

message SubmitTreeSignaturesRequest {
  string batch_id = 1;
  string pubkey = 2;
  map<string, string> tree_signatures = 3;
}
message SubmitTreeSignaturesResponse {}

// ─── SubmitSignedForfeitTxs ─────────────────────────────────────────────────

message SubmitSignedForfeitTxsRequest {
  repeated string signed_forfeit_txs = 1;
  string signed_commitment_tx = 2;
}
message SubmitSignedForfeitTxsResponse {}

// ─── GetEventStream ─────────────────────────────────────────────────────────

message GetEventStreamRequest {
  repeated string topics = 1;
}
message GetEventStreamResponse {
  oneof event {
    BatchStartedEvent batch_started = 1;
    BatchFinalizationEvent batch_finalization = 2;
    BatchFinalizedEvent batch_finalized = 3;
    BatchFailedEvent batch_failed = 4;
    TreeSigningStartedEvent tree_signing_started = 5;
    TreeNoncesAggregatedEvent tree_nonces_aggregated = 6;
    TreeTxEvent tree_tx = 7;
    TreeSignatureEvent tree_signature = 8;
    TreeNoncesEvent tree_nonces = 9;
    Heartbeat heartbeat = 10;
    StreamStartedEvent stream_started = 11;
  }
}

// ─── UpdateStreamTopics ─────────────────────────────────────────────────────

message ModifyTopics {
  repeated string add_topics = 1;
  repeated string remove_topics = 2;
}

message OverwriteTopics {
  repeated string topics = 1;
}

message UpdateStreamTopicsRequest {
  string stream_id = 1;

  oneof topics_change {
    ModifyTopics modify = 2;
    OverwriteTopics overwrite = 3;
  }
}

message UpdateStreamTopicsResponse {
  repeated string topics_added = 1;
  repeated string topics_removed = 2;
  repeated string all_topics = 3;
}

// ─── SubmitTx / FinalizeTx ──────────────────────────────────────────────────

message SubmitTxRequest {
  string signed_ark_tx = 1;
  repeated string checkpoint_txs = 2;
}
message SubmitTxResponse {
  string ark_txid = 1;
  string final_ark_tx = 2;
  repeated string signed_checkpoint_txs = 3;
}

message FinalizeTxRequest {
  string ark_txid = 1;
  repeated string final_checkpoint_txs = 2;
}
message FinalizeTxResponse {}

// ─── GetPendingTx ───────────────────────────────────────────────────────────

message GetPendingTxRequest {
  oneof identifier {
    Intent intent = 1;
  }
}
message GetPendingTxResponse {
  repeated PendingTx pending_txs = 1;
}

// ─── GetTransactionsStream ──────────────────────────────────────────────────

message GetTransactionsStreamRequest {}
message GetTransactionsStreamResponse {
  oneof data {
    TxNotification commitment_tx = 1;
    TxNotification ark_tx = 2;
    Heartbeat heartbeat = 3;
  }
}

// ─── GetIntent ──────────────────────────────────────────────────────────────

message GetIntentRequest {
  oneof filter {
    string txid = 1;
  }
}
message GetIntentResponse {
  Intent intent = 1;
}

// ─── Internal types (kept for backward compatibility) ───────────────────────

// RoundEvent is used internally by the event broker. New clients should use
// GetEventStreamResponse instead.
message RoundEvent {
  oneof event {
    RoundBatchStartedEvent batch_started = 1;
    RoundBatchFinalizationEvent batch_finalization = 2;
    RoundBatchFinalizedEvent batch_finalized = 3;
    RoundBatchFailedEvent batch_failed = 4;
    RoundHeartbeatEvent heartbeat = 5;
    // MuSig2 tree signing events (Go arkd parity)
    TreeSigningStartedEvent tree_signing_started = 6;
    TreeNoncesAggregatedEvent tree_nonces_aggregated = 7;
    TreeTxEvent tree_tx = 8;
    TreeSignatureEvent tree_signature = 9;
    StreamStartedEvent stream_started = 10;
  }
}

message RoundBatchStartedEvent {
  string round_id = 1;
  int64 timestamp = 2;
}

message RoundBatchFinalizationEvent {
  string round_id = 1;
  int64 timestamp = 2;
  int64 min_relay_fee_rate = 3;
}

message RoundBatchFinalizedEvent {
  string round_id = 1;
  string txid = 2;
}

message RoundBatchFailedEvent {
  string round_id = 1;
  string reason = 2;
}

message RoundHeartbeatEvent {
  int64 timestamp = 1;
}
