name: Integration Tests

on:
  schedule:
    - cron: "0 3 * * *"  # 3 AM UTC nightly
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: E2E tests (nigiri regtest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start regtest environment (bitcoind + electrs)
        run: |
          docker network create nigiri

          # Bitcoin Core (regtest)
          docker run -d --name bitcoind \
            --network nigiri \
            -p 18443:18443 \
            ruimarinho/bitcoin-core:latest \
            -regtest=1 \
            -rpcallowip=0.0.0.0/0 \
            -rpcbind=0.0.0.0 \
            -rpcuser=admin1 \
            -rpcpassword=123 \
            -txindex=1 \
            -fallbackfee=0.00001 \
            -server=1

          # Wait for bitcoind
          for i in $(seq 1 30); do
            if docker exec bitcoind bitcoin-cli -regtest -rpcuser=admin1 -rpcpassword=123 getblockchaininfo > /dev/null 2>&1; then
              echo "✅ bitcoind ready"
              break
            fi
            echo "Waiting for bitcoind... ($i/30)"
            sleep 2
          done

          # Create wallet and mine 101 blocks
          docker exec bitcoind bitcoin-cli -regtest -rpcuser=admin1 -rpcpassword=123 createwallet "default"
          ADDR=$(docker exec bitcoind bitcoin-cli -regtest -rpcuser=admin1 -rpcpassword=123 getnewaddress)
          docker exec bitcoind bitcoin-cli -regtest -rpcuser=admin1 -rpcpassword=123 generatetoaddress 101 "$ADDR"

          # Electrs (Esplora API) — try two known-good images
          docker run -d --name electrs \
            --network nigiri \
            -p 5000:3000 \
            -e RUST_LOG=info \
            getmeemaw/electrs:latest \
            --network regtest \
            --daemon-rpc-addr bitcoind:18443 \
            --daemon-dir /tmp \
            --db-dir /tmp/electrs \
            --http-addr 0.0.0.0:3000 \
            --cookie "admin1:123" \
            --jsonrpc-import \
            2>/dev/null || \
          docker run -d --name electrs \
            --network nigiri \
            -p 5000:3002 \
            ghcr.io/vulpemventures/electrs:latest \
            2>/dev/null || true

          # Wait for Esplora (tests skip gracefully if not available)
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/blocks/tip/height 2>/dev/null || echo "000")
            echo "Esplora status: $STATUS ($i/12)"
            if [ "$STATUS" = "200" ]; then echo "✅ Esplora ready"; break; fi
            sleep 5
          done

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Build dark
        run: cargo build --bin dark

      - name: Start dark server
        run: |
          ./target/debug/dark --grpc-port 7070 --admin-port 7071 --log-level warn \
            > /tmp/dark.log 2>&1 &
          echo $! > /tmp/dark.pid

          # Wait for gRPC port (up to 30s)
          for i in $(seq 1 30); do
            if nc -z localhost 7070 2>/dev/null; then
              echo "✅ dark gRPC ready on :7070"
              break
            fi
            echo "Waiting for dark... ($i/30)"
            sleep 1
          done

          # Show startup log if not ready
          if ! nc -z localhost 7070 2>/dev/null; then
            echo "⚠️ dark may not be ready:"
            cat /tmp/dark.log | tail -20
          fi

      - name: Run e2e tests
        env:
          INTEGRATION_TEST: "1"
          BITCOIN_RPC_URL: "http://admin1:123@localhost:18443"
          ESPLORA_URL: "http://localhost:5000"
          DARK_GRPC_URL: "http://127.0.0.1:7070"
          DARK_ADMIN_URL: "http://localhost:7071"
        run: cargo test --test e2e_regtest -- --ignored --test-threads=1 --nocapture

      - name: Run integration tests
        env:
          INTEGRATION_TEST: "1"
          BITCOIN_RPC_URL: "http://admin1:123@localhost:18443"
          ESPLORA_URL: "http://localhost:5000"
        run: cargo test --test integration -- --ignored --test-threads=1 --nocapture

      - name: Show dark logs on failure
        if: failure()
        run: cat /tmp/dark.log || true

      - name: Stop everything
        if: always()
        run: |
          kill $(cat /tmp/dark.pid) 2>/dev/null || true
          docker stop bitcoind electrs 2>/dev/null || true
          docker rm bitcoind electrs 2>/dev/null || true
          docker network rm nigiri 2>/dev/null || true

  go-e2e:
    name: Go E2E tests (arkade-os/arkd suite against dark)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Start regtest environment (nigiri)
        uses: vulpemventures/nigiri-github-action@v1
        with:
          use_liquid: false

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache-dependency-path: vendor/arkd/go.sum

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-go-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-go-e2e-

      - name: Build dark
        run: cargo build --bin dark

      - name: Write dark config for Go e2e tests
        run: |
          cat > /tmp/dark-go-e2e.toml <<'EOF'
          [bitcoin]
          network = "regtest"
          rpc_host = "127.0.0.1"
          rpc_port = 18443
          rpc_user = "admin1"
          rpc_password = "123"
          min_confirmations = 1

          [wallet]
          network = "regtest"
          esplora_url = "http://localhost:3000"
          database_path = "/tmp/dark-go-e2e-wallet.db"
          gap_limit = 20

          [database]
          backend = "sqlite"
          url = "sqlite:///tmp/dark-go-e2e.db"

          [ark]
          round_duration_secs = 10
          vtxo_expiry_blocks = 144
          connector_timelock_blocks = 12
          min_vtxo_amount_sats = 1000
          max_vtxo_amount_sats = 100000000
          utxo_min_amount = 1000
          utxo_max_amount = 100000000
          EOF

      - name: Start dark server
        run: |
          ./target/debug/dark \
            --config /tmp/dark-go-e2e.toml \
            --grpc-port 7070 \
            --admin-port 7071 \
            --log-level warn \
            > /tmp/dark-go-e2e.log 2>&1 &
          echo $! > /tmp/dark-go-e2e.pid

          # Wait for gRPC port to be ready (up to 60s)
          for i in $(seq 1 60); do
            if nc -z 127.0.0.1 7070 2>/dev/null; then
              echo "✅ dark gRPC ready on :7070"
              break
            fi
            echo "Waiting for dark... ($i/60)"
            sleep 1
          done

          # Wait for admin HTTP port to be ready (up to 10s more)
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7071/v1/admin/wallet/status 2>/dev/null || echo "000")
            if [ "$STATUS" != "000" ]; then
              echo "✅ dark admin HTTP ready on :7071 (status: $STATUS)"
              break
            fi
            echo "Waiting for dark admin HTTP... ($i/10)"
            sleep 1
          done

          # Bail out if dark is not listening
          if ! nc -z 127.0.0.1 7070 2>/dev/null; then
            echo "❌ dark failed to start:"
            cat /tmp/dark-go-e2e.log
            exit 1
          fi

      - name: Run arkade-os/arkd Go e2e tests
        working-directory: vendor/arkd
        run: go test -v -count 1 -timeout 1200s github.com/arkade-os/arkd/internal/test/e2e

      - name: Show dark logs on failure
        if: failure()
        run: cat /tmp/dark-go-e2e.log || true

      - name: Stop dark and nigiri
        if: always()
        run: |
          kill $(cat /tmp/dark-go-e2e.pid) 2>/dev/null || true
          nigiri stop --delete 2>/dev/null || true
