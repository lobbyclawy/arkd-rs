version: '3.8'

services:
  arkd:
    image: ghcr.io/lobbyclawy/arkd-rs:latest
    ports:
      - "50051:50051"
    volumes:
      - ./config/arkd.light.toml:/app/config.toml:ro
      - arkd_data:/app/data
    environment:
      - ARKD_CONFIG=/app/config.toml
    restart: unless-stopped

volumes:
  arkd_data:
